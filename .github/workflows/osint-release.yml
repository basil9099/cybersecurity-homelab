name: OSINT Framework Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true

defaults:
  run:
    working-directory: projects/offensive/osint_framework

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: pyinstaller osint_framework.spec

      - name: Verify executable exists
        run: |
          if (!(Test-Path "dist/osint_framework.exe")) {
            Write-Error "Build failed: osint_framework.exe not found"
            exit 1
          }
          Get-Item "dist/osint_framework.exe" | Select-Object Name, Length

      - name: Set version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: osint-framework-windows
          path: projects/offensive/osint_framework/dist/osint_framework.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "OSINT Framework ${{ steps.version.outputs.tag }}"
          body: |
            ## OSINT Reconnaissance Framework ${{ steps.version.outputs.tag }}

            Windows executable release of the OSINT Framework.

            ### Usage
            ```
            osint_framework.exe -t example.com --all
            osint_framework.exe --gui
            ```

            ### Requirements
            - Windows 10/11 (x64)
            - Internet connection for OSINT queries
          files: projects/offensive/osint_framework/dist/osint_framework.exe
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
