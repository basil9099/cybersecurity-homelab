name: OSINT Framework CI

on:
  push:
    paths:
      - "projects/osint_framework/**"
  pull_request:
    paths:
      - "projects/osint_framework/**"

defaults:
  run:
    working-directory: projects/osint_framework

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Lint with ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
